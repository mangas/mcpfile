name: Release Please

on:
  workflow_dispatch: {}

jobs:
  release-please:
    name: Release Please
    runs-on: arc-runner-set-mcpfile
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v6

      - id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Summary
        run: |
          if [ "${{ steps.release.outputs.release_created }}" = "true" ]; then
            echo "### Release ${{ steps.release.outputs.tag_name }} created" >> $GITHUB_STEP_SUMMARY
            echo "Publishing artifacts..." >> $GITHUB_STEP_SUMMARY
          else
            echo "### No release created" >> $GITHUB_STEP_SUMMARY
            echo "A release PR was created or updated. Merge it and re-run this workflow." >> $GITHUB_STEP_SUMMARY
          fi

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    uses: ./.github/workflows/publish.yml
    with:
      tag_name: ${{ needs.release-please.outputs.tag_name }}
    secrets: inherit
