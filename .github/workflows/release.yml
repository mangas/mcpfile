name: Release

on:
  workflow_dispatch: {}

env:
  CARGO_TERM_COLOR: always
  S3_BUCKET: mcpfile-releases
  AWS_REGION: eu-west-3

jobs:
  release-please:
    name: Release Please
    runs-on: arc-runner-set-mcpfile
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v6

      - id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Summary
        run: |
          if [ "${{ steps.release.outputs.release_created }}" = "true" ]; then
            echo "### Release ${{ steps.release.outputs.tag_name }} created" >> $GITHUB_STEP_SUMMARY
            echo "Building and publishing artifacts..." >> $GITHUB_STEP_SUMMARY
          else
            echo "### No release created" >> $GITHUB_STEP_SUMMARY
            echo "A release PR was created or updated. Merge it and re-run this workflow." >> $GITHUB_STEP_SUMMARY
          fi

  build:
    name: Build ${{ matrix.asset_name }}
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: arc-runner-set-mcpfile
            asset_name: x86_64-linux
          - target: aarch64-apple-darwin
            os: macos-latest
            asset_name: aarch64-darwin

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: matrix.os == 'arc-runner-set-mcpfile'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config musl-tools

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-release-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-release-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create archive
        shell: bash
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/mcpfile release/mcpfile-${{ matrix.asset_name }}
          chmod +x release/mcpfile-${{ matrix.asset_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: mcpfile-${{ matrix.asset_name }}
          path: release/mcpfile-${{ matrix.asset_name }}

  docker:
    name: Build and push Docker image
    needs: [release-please, build]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: arc-runner-set-mcpfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Download Linux binary
        uses: actions/download-artifact@v8
        with:
          name: mcpfile-x86_64-linux
          path: docker-build/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: mangas
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            mangas/mcpfile:${{ needs.release-please.outputs.tag_name }}
            mangas/mcpfile:latest
          build-args: |
            BINARY_PATH=docker-build/mcpfile-x86_64-linux

  publish:
    name: Upload to S3
    needs: [release-please, build]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: arc-runner-set-mcpfile
    permissions:
      id-token: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_RELEASE_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload to S3
        run: |
          VERSION=${{ needs.release-please.outputs.tag_name }}
          for artifact_dir in release-artifacts/*/; do
            for file in "$artifact_dir"*; do
              [ -f "$file" ] || continue
              basename=$(basename "$file")
              aws s3 cp "$file" "s3://${S3_BUCKET}/${VERSION}/${basename}"
              aws s3 cp "$file" "s3://${S3_BUCKET}/latest/${basename}"
            done
          done

      - name: Attach binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            release-artifacts/*/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
