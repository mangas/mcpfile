name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0). Leave empty to use latest release-please tag."
        required: false
        type: string

env:
  CARGO_TERM_COLOR: always
  S3_BUCKET: mcpfile-releases
  AWS_REGION: eu-west-3

jobs:
  resolve-tag:
    name: Resolve release tag
    runs-on: arc-runner-set
    outputs:
      version: ${{ steps.tag.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "version=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build ${{ matrix.asset_name }}
    needs: resolve-tag
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: arc-runner-set
            asset_name: x86_64-linux
          - target: aarch64-apple-darwin
            os: macos-latest
            asset_name: aarch64-darwin

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: matrix.os == 'arc-runner-set'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create archive
        shell: bash
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/mcpfile release/mcpfile-${{ matrix.asset_name }}
          chmod +x release/mcpfile-${{ matrix.asset_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: mcpfile-${{ matrix.asset_name }}
          path: release/mcpfile-${{ matrix.asset_name }}

  docker:
    name: Build and push Docker image
    needs: [resolve-tag, build]
    runs-on: arc-runner-set

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download Linux binary
        uses: actions/download-artifact@v8
        with:
          name: mcpfile-x86_64-linux
          path: docker-build/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: mangas
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            mangas/mcpfile:${{ needs.resolve-tag.outputs.version }}
            mangas/mcpfile:latest
          build-args: |
            BINARY_PATH=docker-build/mcpfile-x86_64-linux

  publish:
    name: Publish release
    needs: [resolve-tag, build, docker]
    runs-on: arc-runner-set
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_RELEASE_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload to S3
        run: |
          VERSION=${{ needs.resolve-tag.outputs.version }}
          for artifact_dir in release-artifacts/*/; do
            for file in "$artifact_dir"*; do
              [ -f "$file" ] || continue
              basename=$(basename "$file")
              aws s3 cp "$file" "s3://${S3_BUCKET}/${VERSION}/${basename}"
              aws s3 cp "$file" "s3://${S3_BUCKET}/latest/${basename}"
            done
          done

      - name: Generate changelog
        id: changelog
        run: |
          echo "## What's Changed" > changelog.md
          echo "" >> changelog.md
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            git log ${PREV_TAG}..HEAD --pretty=format:"- %s" >> changelog.md
          else
            echo "Initial release" >> changelog.md
          fi

      - name: Create or update tag
        run: |
          VERSION=${{ needs.resolve-tag.outputs.version }}
          git tag -f "$VERSION"
          git push origin "$VERSION" --force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-tag.outputs.version }}
          name: Release ${{ needs.resolve-tag.outputs.version }}
          body_path: changelog.md
          draft: false
          prerelease: false
          files: |
            release-artifacts/*/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
