name: Publish

on:
  push:
    tags:
      - "mcpfile-v*"
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  S3_BUCKET: mcpfile-releases
  AWS_REGION: eu-west-3

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: arc-runner-set-mcpfile
            asset_name: x86_64-linux
          - target: aarch64-apple-darwin
            os: macos-latest
            asset_name: aarch64-darwin

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config musl-tools

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-release-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create archive
        shell: bash
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/mcpfile release/mcpfile-${{ matrix.asset_name }}
          chmod +x release/mcpfile-${{ matrix.asset_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: mcpfile-${{ matrix.asset_name }}
          path: release/mcpfile-${{ matrix.asset_name }}

  publish:
    name: Publish Release
    needs: build
    runs-on: arc-runner-set-mcpfile
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag_name }}" ]; then
            echo "name=${{ inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts

      - name: Install AWS CLI
        run: |
          if ! command -v aws &> /dev/null; then
            curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
            unzip -q /tmp/awscliv2.zip -d /tmp
            sudo /tmp/aws/install
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_RELEASE_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload to S3
        run: |
          VERSION=${{ steps.tag.outputs.name }}
          for artifact_dir in release-artifacts/*/; do
            for file in "$artifact_dir"*; do
              [ -f "$file" ] || continue
              basename=$(basename "$file")
              aws s3 cp "$file" "s3://${S3_BUCKET}/${VERSION}/${basename}"
              aws s3 cp "$file" "s3://${S3_BUCKET}/latest/${basename}"
            done
          done
          echo -n "$VERSION" > /tmp/VERSION
          aws s3 cp /tmp/VERSION "s3://${S3_BUCKET}/latest/VERSION" --content-type text/plain

      - name: Attach binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: |
            release-artifacts/*/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
